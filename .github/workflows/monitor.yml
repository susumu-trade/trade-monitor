name: trade-monitor

on:
  schedule:
    - cron: '0 */3 * * *'    # 3時間ごとに起動(各起動の中で長時間ループする)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: true    # 新しい起動が古いループを引き継ぐ

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run monitor (loop)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          LOOP_MINUTES: '330'
          POLL_SECONDS: '120'
          ENABLE_SPIKE: '0'      # 急変動はTradingViewへ移したのでクラウドはOFF
          ENABLE_SIGNAL: '0'     # 売買シグナルもTradingViewへ移したのでOFF
          ENABLE_NEWS: '1'       # ニュースはクラウドで担当
          ENABLE_CALENDAR: '1'   # 経済指標カレンダーもクラウドで担当
        run: python cloud_run.py
